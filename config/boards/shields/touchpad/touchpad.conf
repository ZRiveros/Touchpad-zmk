# Connectivity
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y

# Pointing / trackpad
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_PINCTRL=y
CONFIG_INPUT_AZOTEQ_IQS5XX=y

# Stack sizes (I2C polling needs headroom)
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_ZMK_BLE_KEYBOARD_REPORT_QUEUE_SIZE=50
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=4096

# Clear stale BLE bonds on every boot (remove after first successful pair)
CONFIG_ZMK_SETTINGS_RESET_ON_START=y
